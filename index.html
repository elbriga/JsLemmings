<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lemmings</title>
  <style type="text/css" media="screen">
body {
  background-color: white;
  color: black;
}
.hidden {
  display: none;
}
#original {
  margin-left: 1em;
}
  </style>
</head>

<body>
  <script src="js/lib/jsgame0.js"></script>
  <script src="js/lib/screen.js"></script>
  <script src="js/lib/surface.js"></script>
  <script src="js/lib/sprite.js"></script>
  <script src="js/lib/input.js"></script>

  <script src="js/assets.js"></script>
  <script src="js/level.js"></script>
  <script src="js/game.js"></script>
  <script src="js/entity.js"></script>
  <script src="js/lemming.js"></script>
  <script src="js/lemmingState.js"></script>
<main>
<h1>lemmings</h1>

<canvas id="screen">
The game screen appears here if your browser supports the Canvas API.
</canvas>
<section id="controls">
  <button type="button" id="reset">Reset</button>
  <button type="button" id="pause">Pause</button>
</section>
<div id="debug">DEBUG</div>
</main>
<script>
var game = undefined;
// screen size
HEIGHT = 800;
WIDTH = 800;

async function reset() {
  console.log("reset()");
  game = await Game.create(1);
}

function update() {
  if(game) game.update();
}

function draw() {
  if(game) game.draw();
}

function on_mouse_move(pos, delta, buttons) {
  Input.updateMouse(pos, delta, buttons);
}

window.addEventListener('load', async (event) => {
  screen.init();
});
</script>
</body>

</html>
